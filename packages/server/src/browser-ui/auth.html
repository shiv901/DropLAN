<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>DropLAN — Connect</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0b0b18;
      --surface:   #13131f;
      --surface2:  #1c1c2e;
      --border:    #2a2a42;
      --accent:    #7c6dfa;
      --accent-glow: rgba(124, 109, 250, 0.35);
      --text:      #e8e8f0;
      --text-muted:#7878a0;
      --error:     #f87171;
      --success:   #4ade80;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      font-family: 'Inter', system-ui, sans-serif;
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Background ambient glow */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 40% at 50% 0%, rgba(124, 109, 250, 0.12) 0%, transparent 70%),
        radial-gradient(ellipse 40% 30% at 80% 100%, rgba(99, 179, 237, 0.06) 0%, transparent 60%);
      pointer-events: none;
    }

    .card {
      position: relative;
      z-index: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 44px 36px 40px;
      width: min(360px, calc(100vw - 32px));
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      box-shadow: 0 32px 80px rgba(0,0,0,0.5), 0 0 0 1px rgba(124,109,250,0.08);
    }

    .logo-wrap {
      width: 64px;
      height: 64px;
      background: linear-gradient(135deg, var(--accent) 0%, #63b3ed 100%);
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      margin-bottom: 20px;
      box-shadow: 0 8px 32px var(--accent-glow);
    }

    h1 {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.3px;
      margin-bottom: 6px;
    }

    .subtitle {
      font-size: 13.5px;
      color: var(--text-muted);
      text-align: center;
      line-height: 1.5;
      margin-bottom: 36px;
    }

    /* PIN inputs */
    .pin-row {
      display: flex;
      gap: 12px;
      margin-bottom: 16px;
    }

    .pin-box {
      width: 62px;
      height: 70px;
      background: var(--surface2);
      border: 2px solid var(--border);
      border-radius: 14px;
      color: var(--text);
      font-size: 28px;
      font-weight: 600;
      text-align: center;
      caret-color: var(--accent);
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
      -webkit-tap-highlight-color: transparent;
      /* Hide the default caret on mobile to avoid flicker */
      cursor: default;
    }

    .pin-box:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    .pin-box.filled {
      border-color: rgba(124, 109, 250, 0.5);
    }

    /* Shake animation for wrong PIN */
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      15%       { transform: translateX(-8px); }
      30%       { transform: translateX(8px); }
      45%       { transform: translateX(-6px); }
      60%       { transform: translateX(6px); }
      75%       { transform: translateX(-3px); }
      90%       { transform: translateX(3px); }
    }

    .pin-row.shake { animation: shake 0.45s ease; }

    .pin-box.error { border-color: var(--error) !important; box-shadow: 0 0 0 3px rgba(248,113,113,0.2) !important; }

    /* Status messages */
    .status-msg {
      min-height: 20px;
      font-size: 12.5px;
      font-weight: 500;
      text-align: center;
      color: var(--error);
      margin-bottom: 28px;
      transition: opacity 0.2s;
    }

    .status-msg:empty { opacity: 0; }

    /* Submit button */
    .submit-btn {
      width: 100%;
      padding: 14px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-family: inherit;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s, transform 0.1s;
      margin-bottom: 20px;
    }

    .submit-btn:hover  { background: #8f82fc; }
    .submit-btn:active { transform: scale(0.97); }
    .submit-btn:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }

    .hint {
      font-size: 12px;
      color: var(--text-muted);
      text-align: center;
      line-height: 1.5;
    }

    /* Success overlay */
    .success-overlay {
      position: fixed;
      inset: 0;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s;
      z-index: 100;
    }

    .success-overlay.visible { opacity: 1; pointer-events: all; }

    .success-icon {
      width: 72px;
      height: 72px;
      background: linear-gradient(135deg, var(--success) 0%, #22c55e 100%);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
    }

    .success-overlay p { font-size: 16px; font-weight: 600; color: var(--success); }

    /* Loading spinner */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      width: 20px; height: 20px;
      border: 2.5px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: inline-block;
      vertical-align: middle;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo-wrap">📡</div>
    <h1>DropLAN</h1>
    <p class="subtitle">Enter the code shown on your Mac<br>to connect securely</p>

    <div class="pin-row" id="pinRow">
      <input class="pin-box" id="p0" type="tel" inputmode="numeric" pattern="[0-9]*" maxlength="1" autocomplete="one-time-code" aria-label="PIN digit 1">
      <input class="pin-box" id="p1" type="tel" inputmode="numeric" pattern="[0-9]*" maxlength="1" autocomplete="off"             aria-label="PIN digit 2">
      <input class="pin-box" id="p2" type="tel" inputmode="numeric" pattern="[0-9]*" maxlength="1" autocomplete="off"             aria-label="PIN digit 3">
      <input class="pin-box" id="p3" type="tel" inputmode="numeric" pattern="[0-9]*" maxlength="1" autocomplete="off"             aria-label="PIN digit 4">
    </div>

    <p class="status-msg" id="statusMsg" role="alert"></p>

    <button class="submit-btn" id="submitBtn" disabled>Connect</button>

    <p class="hint">💡 Scan the QR code on your Mac<br>to connect without typing</p>
  </div>

  <div class="success-overlay" id="successOverlay">
    <div class="success-icon">✓</div>
    <p>Connected!</p>
  </div>

  <script>
    (function () {
      const boxes   = Array.from(document.querySelectorAll('.pin-box'));
      const pinRow  = document.getElementById('pinRow');
      const statusMsg = document.getElementById('statusMsg');
      const submitBtn = document.getElementById('submitBtn');
      const successOverlay = document.getElementById('successOverlay');

      let submitting = false;

      function getPin() {
        return boxes.map(b => b.value).join('');
      }

      function updateSubmitState() {
        const pin = getPin();
        submitBtn.disabled = pin.length < 4 || submitting;
      }

      function setError(msg) {
        statusMsg.textContent = msg;
        boxes.forEach(b => b.classList.add('error'));
        pinRow.classList.remove('shake');
        // Force reflow to restart animation
        void pinRow.offsetWidth;
        pinRow.classList.add('shake');
        // Clear error after animation
        setTimeout(() => {
          boxes.forEach(b => b.classList.remove('error'));
        }, 500);
      }

      function clearError() {
        statusMsg.textContent = '';
        boxes.forEach(b => b.classList.remove('error'));
      }

      function clearAll() {
        boxes.forEach(b => { b.value = ''; b.classList.remove('filled', 'error'); });
        boxes[0].focus();
        updateSubmitState();
      }

      async function submit() {
        const pin = getPin();
        if (pin.length < 4 || submitting) return;

        submitting = true;
        submitBtn.innerHTML = '<span class="spinner"></span>';
        submitBtn.disabled = true;
        clearError();

        try {
          const res = await fetch('/api/auth', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ code: pin }),
          });

          if (res.ok) {
            // Show success overlay then navigate to upload page
            successOverlay.classList.add('visible');
            setTimeout(() => { window.location.href = '/'; }, 700);
          } else {
            setError('Incorrect code — try again');
            submitBtn.textContent = 'Connect';
            submitting = false;
            clearAll();
          }
        } catch {
          setError('Connection error — try again');
          submitBtn.textContent = 'Connect';
          submitting = false;
        }
        updateSubmitState();
      }

      boxes.forEach((box, i) => {
        box.addEventListener('focus', () => box.select());

        box.addEventListener('input', () => {
          // Only allow digits
          box.value = box.value.replace(/\D/g, '').slice(-1);
          clearError();

          if (box.value) {
            box.classList.add('filled');
            if (i < boxes.length - 1) {
              boxes[i + 1].focus();
            }
          } else {
            box.classList.remove('filled');
          }

          updateSubmitState();

          // Auto-submit when last digit is entered
          if (i === boxes.length - 1 && getPin().length === 4) {
            submit();
          }
        });

        box.addEventListener('keydown', (e) => {
          if (e.key === 'Backspace' && !box.value && i > 0) {
            boxes[i - 1].value = '';
            boxes[i - 1].classList.remove('filled');
            boxes[i - 1].focus();
            updateSubmitState();
          }
          if (e.key === 'Enter') submit();
        });

        // Handle paste (e.g. from password manager)
        box.addEventListener('paste', (e) => {
          e.preventDefault();
          const text = (e.clipboardData || window.clipboardData).getData('text');
          const digits = text.replace(/\D/g, '').slice(0, 4);
          digits.split('').forEach((d, idx) => {
            if (boxes[idx]) {
              boxes[idx].value = d;
              boxes[idx].classList.add('filled');
            }
          });
          const next = Math.min(digits.length, boxes.length - 1);
          boxes[next].focus();
          updateSubmitState();
          if (digits.length === 4) submit();
        });
      });

      submitBtn.addEventListener('click', submit);

      // Auto-focus first box
      setTimeout(() => boxes[0].focus(), 100);
    })();
  </script>
</body>
</html>
